name: Rust

on:
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_TERM_VERBOSE: true

jobs:
  check-fmt:
    name: cargo fmt
    runs-on:
      - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Give GitHub Actions access to private repos
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WORKFLOW_PULL_KEY }}

      - name: Add nightly rustfmt
        run: |
          rustup toolchain install nightly
          rustup component add --toolchain nightly rustfmt
      - name: cargo fmt
        run: cargo +nightly fmt --check

  check-clippy:
    name: cargo clippy
    runs-on:
      - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Give GitHub Actions access to private repos
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WORKFLOW_PULL_KEY }}

      - name: cargo clippy
        run: cargo clippy --all-features --all-targets --verbose -- --deny warnings

  # check-cargo-lock:
  #   name: Check Cargo.lock
  #   runs-on:
  #     - ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         lfs: true
  #     - name: Give GitHub Actions access to private repos
  #       uses: webfactory/ssh-agent@v0.9.0
  #       with:
  #         ssh-private-key: ${{ secrets.WORKFLOW_PULL_KEY }}
  #
  #     - name: Check Cargo.lock
  #       run: cargo update --locked

  test:
    name: cargo build and test
    runs-on:
      - ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Give GitHub Actions access to private repos
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WORKFLOW_PULL_KEY }}

      - name: Add wasm-pack
        run: |
          cargo install wasm-pack

      - name: cargo build
        run: cargo build --all-features
      - name: cargo test
        run: cargo test --all-features --verbose
      - name: wasm-pack test
        run: wasm-pack test --chrome --headless

      - name: free some disk space
        run: |
          # Remove Java (JDKs)
          sudo rm -rf /usr/lib/jvm

          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove Haskell (GHC)
          sudo rm -rf /usr/local/.ghcup

          # Remove Julia
          sudo rm -rf /usr/local/julia*

          # Remove Android SDKs
          sudo rm -rf /usr/local/lib/android

          # Remove Azure CLI
          sudo rm -rf /opt/az

          # Remove PowerShell
          sudo rm -rf /usr/local/share/powershell

          # Remove CodeQL and other toolcaches
          sudo rm -rf /opt/hostedtoolcache

          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - name: cargo build important feature permutations
        run: ./feat-permut.sh build
      - name: cargo test important feature permutations
        run: ./feat-permut.sh test
      - name: wasm-pack test important feature permutations
        run: ./feat-permut.sh wasm-test

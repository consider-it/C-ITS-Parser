[package]
name = "etsi-web"
version = "0.1.0"
edition = "2021"
authors = ["Kevin Westphal"]
description = "Tools for encoding and decoding ETSI messages (GN + Transport + CAM/DENM/IVIM/SSEM/SREM/MAPEM/SPATEM)"
readme = "./README.md"

[lib]
name = "etsi_web"
crate-type = ["cdylib"]

[profile.release]
lto = true

[dependencies]
etsi-geonetworking = { git = "https://github.com/consider-it/V2X-Geonetworking" }
etsi-transports = { git = "https://github.com/consider-it/V2X-Transport_protocols" }
js-sys = "0.3.65"
rasn = { version = "0.12"  }
wasm-bindgen = "0.2.87"

[dev-dependencies]
hex = { version = "0.4" }

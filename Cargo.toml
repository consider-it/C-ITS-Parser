[package]
name = "etsi-web"
version = "0.3.0"
edition = "2021"
authors = ["Kevin Westphal"]
description = "Tools for encoding and decoding ETSI messages (GN + Transport + CAM/DENM/IVIM/SSEM/SREM/MAPEM/SPATEM)"
readme = "./README.md"
repository = "https://github.com/consider-it/V2X-Etsi_web"

[lib]
name = "etsi_web"
crate-type = ["lib", "cdylib"]
doctest = false

[profile.release]
lto = true

[features]

[dependencies]
etherparse = "0.13"
geonetworking = { version = "0.1", default-features = false, features = ["json"] }
lazy_static = "1.4.0"
nom = { version = "7.1.3" }
num = { version = "0.4.1" }
rasn = { version = "0.14.0" }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }

[target.wasm32-unknown-unknown.dependencies]
js-sys = { version = "0.3.65" }
wasm-bindgen = { version = "0.2.87" }

[dev-dependencies]
hex = { version = "0.4" }
wasm-bindgen-test = "0.3.0"

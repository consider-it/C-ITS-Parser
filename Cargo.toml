[package]
name = "etsi-web"
version = "0.6.1-dev"
edition = "2021"
authors = ["consider it GmbH"]
description = "Tools for encoding and decoding ETSI messages (GN + Transport + CAM/DENM/IVIM/SSEM/SREM/MAPEM/SPATEM)"
readme = "./README.md"
repository = "https://github.com/consider-it/V2X-Etsi_web"

[lib]
name = "etsi_web"
crate-type = ["lib", "cdylib"]
doctest = false

[profile.release]
lto = true

[features]
default = ["etsi"]
etsi = ["rasn"]

[dependencies]
etherparse = "0.14"
geonetworking = { version = "0.1", default-features = false, features = ["json"] }
hex = "0.4"
nom = { version = "7.1.3" }
rasn = { version = "0.27.2", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }

[target.wasm32-unknown-unknown.dependencies]
js-sys = { version = "0.3.78" }
wasm-bindgen = { version = "0.2.101" }

[dev-dependencies]
pretty_assertions = "1.4.1"
wasm-bindgen-test = "0.3.51"
xmltree = "0.11.0"

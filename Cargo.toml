[package]
name = "etsi-web"
version = "0.1.2"
edition = "2021"
authors = ["Kevin Westphal"]
description = "Tools for encoding and decoding ETSI messages (GN + Transport + CAM/DENM/IVIM/SSEM/SREM/MAPEM/SPATEM)"
readme = "./README.md"

[lib]
name = "etsi_web"
crate-type = ["lib", "cdylib"]

[profile.release]
lto = true

[features]
default = ["wasm"]
wasm = ["wasm-bindgen", "js-sys"]

[dependencies]
etsi-geonetworking = { git = "https://github.com/consider-it/V2X-Geonetworking", tag = "v0.1.0" }
etsi-transports = { git = "https://github.com/consider-it/V2X-Transport_protocols", tag = "v0.1.0" }
js-sys = { version = "0.3.65", optional = true }
rasn = { version = "0.12"  }
wasm-bindgen = { version = "0.2.87", optional = true }

[dev-dependencies]
hex = { version = "0.4" }
wasm-bindgen-test = "0.3.0"
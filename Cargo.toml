[package]
name = "etsi-web"
version = "0.1.8"
edition = "2021"
authors = ["Kevin Westphal"]
description = "Tools for encoding and decoding ETSI messages (GN + Transport + CAM/DENM/IVIM/SSEM/SREM/MAPEM/SPATEM)"
readme = "./README.md"
repository = "https://github.com/consider-it/V2X-Etsi_web"

[lib]
name = "etsi_web"
crate-type = ["lib", "cdylib"]
doctest = false

[profile.release]
lto = true

[features]

[dependencies]
geonetworking = { git = "https://github.com/consider-it/V2X-Geonetworking", tag = "v0.1.5", default-features = false, features = ["json"] }
etsi-transports = { git = "https://github.com/consider-it/V2X-Transport_protocols", tag = "v0.1.0" }
rasn = { version = "0.12"  }

[target.wasm32-unknown-unknown.dependencies]
js-sys = { version = "0.3.65" }
wasm-bindgen = { version = "0.2.87" }

[dev-dependencies]
hex = { version = "0.4" }
wasm-bindgen-test = "0.3.0"